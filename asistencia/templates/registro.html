{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCombat - Acceso</title>
    <style>
        /* Diseño Dark Gym */
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); /* Nuevo fondo degradado */
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            background: rgba(0, 0, 0, 0.6); /* Fondo semitransparente */
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            backdrop-filter: blur(10px); /* Efecto vidrio borroso */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .logo-img {
            width: 120px; /* Tamaño controlado del logo */
            height: auto;
            margin-bottom: 20px;
            border-radius: 50%; /* Opcional: hace el logo redondo si es cuadrado */
        }

        h2 { margin-bottom: 25px; font-weight: 300; letter-spacing: 1px; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 30px;
            color: white;
            text-align: center;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { outline: none; background: rgba(255, 255, 255, 0.2); }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
            transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.05); background: #f40612; }

        .btn-excel {
            display: inline-block;
            margin-top: 30px;
            color: #aaa;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }
        .btn-excel:hover { color: white; border-color: white; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="card">
        <img src="{% static 'img/logo.png' %}" alt="Logo MCombat" class="logo-img">
        
        <h2>REGISTRO MCOMBAT</h2>

        {% if messages %}
            {% for message in messages %}
                <div style="background: rgba(46, 204, 113, 0.2); padding: 10px; border-radius: 10px; margin-bottom: 15px; color: #2ecc71;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="dni" placeholder="Ingresa tu DNI" autofocus required autocomplete="off">
            <button type="submit" class="btn-main">MARCAR ASISTENCIA</button>
        </form>

        <a href="{% url 'exportar_excel' %}" class="btn-excel">
            📊 Descargar Reporte
        </a>
    </div>

</body>
</html>
