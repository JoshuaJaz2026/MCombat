<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MCombat - Ingreso</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #333; padding: 40px; border-radius: 10px; text-align: center; width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #e50914; margin-bottom: 30px; }
        input { width: 80%; padding: 15px; font-size: 18px; text-align: center; border: none; border-radius: 5px; margin-bottom: 20px; }
        button { background-color: #e50914; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; width: 100%; }
        button:hover { background-color: #b20710; }
        .mensaje { padding: 15px; margin-bottom: 20px; border-radius: 5px; font-weight: bold; }
        .success { background-color: #2ecc71; color: #fff; }
        .error { background-color: #e74c3c; color: #fff; }
        
        /* Estilo extra para el botón de Excel */
        .admin-zone { margin-top: 30px; padding-top: 20px; border-top: 1px solid #555; }
        .btn-excel { background-color: #27ae60; font-size: 14px; padding: 10px 15px; display: inline-block; }
        .btn-excel:hover { background-color: #219150; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🥊 MCombat Acceso</h1>
        
        {% if messages %}
            {% for message in messages %}
                <div class="mensaje {{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="dni" placeholder="Ingresa tu DNI aquí" autofocus required autocomplete="off">
            <button type="submit">MARCAR ASISTENCIA</button>
        </form>

        <div class="admin-zone">
            <p style="font-size: 12px; color: #888; margin-bottom: 10px;">Zona Administrativa</p>
            <a href="{% url 'exportar_excel' %}" style="background-color: green; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-size: 14px;">
                📊 Descargar Excel
            </a>
        </div>
        </div>
</body>
</html>
